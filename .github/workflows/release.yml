name: Release
on:
  push:
    tags: ['v*']
  workflow_dispatch:        # manual test builds (uploads artifacts, no release)
permissions:
  contents: write           # required to create/attach the Release
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: terminal-dash-linux
          - os: macos-latest
            asset: terminal-dash-macos
          - os: windows-latest
            asset: terminal-dash-windows.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'      # pinned: PyInstaller reliable here
      - name: Install deps
        shell: bash
        run: |
          python -m pip install --upgrade pip pyinstaller
          if [ "${{ runner.os }}" = "Windows" ]; then pip install windows-curses; fi
      - name: Build
        run: pyinstaller --onefile --name terminal-dash terminal_dash.py
      - name: Stage binary
        shell: bash
        run: |
          mkdir out
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp dist/terminal-dash.exe "out/${{ matrix.asset }}"
          else
            cp dist/terminal-dash "out/${{ matrix.asset }}"
          fi
      - name: Upload workflow artifact          # for manual/dispatch runs
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: out/${{ matrix.asset }}
      - name: Attach to Release                 # only on tag pushes
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: out/${{ matrix.asset }}
